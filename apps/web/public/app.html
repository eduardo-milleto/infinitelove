<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eduardo e Isabella - 1 ano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   STARDEW-INSPIRED LOVE SITE
   Paleta: pôr do sol / noite estrelada
   ============================================ */

@font-face { font-family: 'placeholder'; src: local('Arial'); }

:root {
  --pixel: 'VT323', 'Courier New', monospace;
  --serif: 'Lora', 'Georgia', serif;
  --mono: 'JetBrains Mono', monospace;

  --cream: #f4e4c1;
  --cream-2: #ede0c3;
  --wood: #8b5a2c;
  --wood-dark: #4a2c1a;
  --wood-light: #d9b08c;
  --night: #2d1b3d;
  --night-deep: #0d0a2e;
  --sunset: #d97760;
  --rose: #c94c4c;
  --rose-light: #ff6b8a;
  --gold: #f0c040;
  --leaf: #5a8a3e;
  --leaf-dark: #3d5c2a;
  --firefly: #fff4a3;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--cream);
  font-family: var(--serif);
  color: var(--wood-dark);
  overflow-x: hidden;
}

/* Faixa de grama com textura pixel */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(139, 90, 44, 0.04) 0 2px, transparent 2px),
    radial-gradient(circle at 80% 70%, rgba(139, 90, 44, 0.04) 0 2px, transparent 2px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

img, svg { image-rendering: pixelated; }

/* ============================================
   TIPOGRAFIA
   ============================================ */
h1, h2, h3 { font-family: var(--serif); font-weight: 600; letter-spacing: -0.01em; margin: 0; }
.section-label {
  font-family: var(--pixel);
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--sunset);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.section-title {
  font-size: clamp(36px, 5vw, 58px);
  line-height: 1.05;
  color: var(--wood-dark);
  margin-bottom: 32px;
  font-style: italic;
  font-weight: 500;
}

/* ============================================
   NAVBAR
   ============================================ */
.navbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  background: rgba(244, 228, 193, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 3px solid var(--wood-dark);
  box-shadow: 0 4px 0 rgba(45, 26, 15, 0.1);
}
.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--pixel);
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--wood-dark);
}
.navbar-links {
  display: flex;
  gap: 20px;
}
.nav-link {
  font-family: var(--pixel);
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--wood-dark);
  text-decoration: none;
  padding: 4px 10px;
  border-radius: 2px;
  transition: all 0.15s;
}
.nav-link:hover {
  background: var(--sunset);
  color: var(--cream);
  transform: translate(-1px, -1px);
  box-shadow: 2px 2px 0 var(--wood-dark);
}

/* ============================================
   BOTÕES / CARDS
   ============================================ */
.pixel-btn {
  font-family: var(--pixel);
  font-size: 18px;
  letter-spacing: 2px;
  background: var(--sunset);
  color: var(--cream);
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  box-shadow:
    inset -4px -4px 0 rgba(0,0,0,0.2),
    inset 4px 4px 0 rgba(255,255,255,0.2),
    4px 4px 0 var(--wood-dark);
  transition: all 0.1s;
  text-transform: lowercase;
}
.pixel-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow:
    inset -4px -4px 0 rgba(0,0,0,0.2),
    inset 4px 4px 0 rgba(255,255,255,0.2),
    6px 6px 0 var(--wood-dark);
}
.pixel-btn:active {
  transform: translate(2px, 2px);
  box-shadow:
    inset 4px 4px 0 rgba(0,0,0,0.2),
    inset -4px -4px 0 rgba(255,255,255,0.2),
    0 0 0 var(--wood-dark);
}
.pixel-btn-small { font-size: 14px; padding: 8px 14px; box-shadow: 3px 3px 0 var(--wood-dark); }

.pixel-card {
  background: var(--cream-2);
  border: 4px solid var(--wood-dark);
  padding: 32px;
  box-shadow:
    8px 8px 0 var(--wood-dark),
    inset 0 0 0 2px var(--cream);
  position: relative;
}
.pixel-card-header {
  font-family: var(--pixel);
  font-size: 14px;
  letter-spacing: 3px;
  text-align: center;
  color: var(--wood);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.pixel-card-header .dot {
  width: 8px; height: 8px; background: var(--rose);
}

/* ============================================
   COUNTER
   ============================================ */
.counter-section {
  padding: 60px 32px;
  position: relative;
  z-index: 2;
}
.counter-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin: 20px 0 16px;
}
.counter-cell {
  text-align: center;
  padding: 16px 8px;
  background: var(--cream);
  border: 3px solid var(--wood-dark);
  box-shadow: 4px 4px 0 rgba(45, 26, 15, 0.15);
}
.counter-num {
  font-family: var(--pixel);
  font-size: 54px;
  line-height: 1;
  color: var(--sunset);
  text-shadow: 3px 3px 0 var(--wood-dark);
}
.counter-label {
  font-family: var(--pixel);
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--wood-dark);
  margin-top: 4px;
  text-transform: uppercase;
}
.counter-foot {
  text-align: center;
  font-style: italic;
  color: var(--wood-dark);
  opacity: 0.85;
  font-size: 16px;
}

/* ============================================
   GALERIA
   ============================================ */
.gallery-section, .timeline-section, .letter-section,
.playlist-section, .map-section, .ach-section,
.inv-section, .final-section {
  padding: 80px 32px;
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 28px;
}
.memory-card {
  background: var(--cream-2);
  border: 4px solid var(--wood-dark);
  box-shadow: 6px 6px 0 var(--wood-dark);
  cursor: pointer;
  transition: transform 0.15s;
  overflow: hidden;
}
.memory-card:hover {
  transform: translate(-3px, -3px);
  box-shadow: 9px 9px 0 var(--wood-dark);
}
.memory-photo {
  position: relative;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  border-bottom: 3px solid var(--wood-dark);
}
.photo-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--sunset), var(--rose) 60%, var(--wood) 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ph-pattern {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0 8px, transparent 8px 16px),
    repeating-linear-gradient(-45deg, rgba(0,0,0,0.06) 0 8px, transparent 8px 16px);
}
.ph-label {
  position: relative;
  font-family: var(--pixel);
  font-size: 16px;
  color: var(--cream);
  letter-spacing: 2px;
  padding: 10px 16px;
  background: rgba(45, 26, 15, 0.7);
  border: 2px solid var(--cream);
  text-transform: lowercase;
}
.memory-date-tag {
  position: absolute;
  top: 14px; left: 14px;
  padding: 5px 10px;
  background: var(--cream);
  border: 2px solid var(--wood-dark);
  font-family: var(--pixel);
  font-size: 13px;
  letter-spacing: 1.5px;
  color: var(--wood-dark);
  box-shadow: 2px 2px 0 var(--wood-dark);
}
.memory-body { padding: 20px 22px; }
.memory-body h3 {
  font-size: 24px;
  margin-bottom: 8px;
  font-style: italic;
  color: var(--wood-dark);
}
.memory-body p {
  font-size: 15px;
  line-height: 1.5;
  color: var(--wood-dark);
  opacity: 0.85;
  margin: 0 0 14px;
  text-wrap: pretty;
}

/* ============================================
   TIMELINE
   ============================================ */
.timeline {
  position: relative;
  padding: 20px 0;
}
.timeline-line {
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 4px;
  background: repeating-linear-gradient(to bottom, var(--wood-dark) 0 6px, transparent 6px 12px);
  transform: translateX(-50%);
}
.timeline-item {
  position: relative;
  margin-bottom: 40px;
  width: 50%;
  padding: 0 40px;
}
.timeline-item.left { left: 0; text-align: right; }
.timeline-item.right { left: 50%; }
.timeline-node {
  position: absolute;
  top: 20px;
  width: 16px; height: 16px;
  background: var(--rose);
  border: 3px solid var(--wood-dark);
  box-shadow: 2px 2px 0 var(--wood-dark);
}
.timeline-item.left .timeline-node { right: -10px; }
.timeline-item.right .timeline-node { left: -10px; }
.timeline-card {
  background: var(--cream-2);
  border: 3px solid var(--wood-dark);
  box-shadow: 5px 5px 0 var(--wood-dark);
  padding: 18px 22px;
}
.timeline-date {
  font-family: var(--pixel);
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--sunset);
  margin-bottom: 4px;
}
.timeline-card h3 {
  font-size: 22px;
  font-style: italic;
  margin-bottom: 6px;
}
.timeline-card p { margin: 0; font-size: 15px; line-height: 1.5; opacity: 0.88; }

/* ============================================
   LETTER
   ============================================ */
.letter-scroll {
  max-width: 760px;
  margin: 0 auto;
  background: var(--cream-2);
  border: 4px solid var(--wood-dark);
  box-shadow: 10px 10px 0 var(--wood-dark);
  padding: 48px 56px;
  position: relative;
}
.letter-scroll::before, .letter-scroll::after {
  content: '';
  position: absolute;
  left: 12px; right: 12px;
  height: 6px;
  background: var(--wood);
}
.letter-scroll::before { top: 12px; }
.letter-scroll::after { bottom: 12px; }
.letter-body p {
  font-size: 19px;
  line-height: 1.75;
  text-wrap: pretty;
  margin: 0 0 18px;
  color: var(--wood-dark);
}
.letter-body p:first-child {
  font-family: var(--pixel);
  font-size: 26px;
  letter-spacing: 1.5px;
  color: var(--sunset);
  margin-bottom: 26px;
}

/* ============================================
   PLAYLIST
   ============================================ */
.playlist-box {
  max-width: 720px;
  margin: 0 auto;
  background: var(--cream-2);
  border: 4px solid var(--wood-dark);
  box-shadow: 8px 8px 0 var(--wood-dark);
  padding: 24px 28px;
}
.playlist-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 2px dashed var(--wood-dark);
  color: var(--wood-dark);
}
.playlist-list {
  list-style: none;
  padding: 0; margin: 0;
}
.playlist-list li {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 10px;
  cursor: pointer;
  border-bottom: 1px dotted rgba(74, 44, 26, 0.3);
  transition: background 0.1s;
}
.playlist-list li:hover { background: rgba(217, 119, 96, 0.1); }
.playlist-list li.active { background: rgba(217, 119, 96, 0.25); }
.pl-num { font-family: var(--pixel); font-size: 16px; color: var(--sunset); min-width: 24px; }
.pl-title { font-size: 16px; font-style: italic; }
.pl-mood { font-family: var(--pixel); font-size: 12px; color: var(--wood); letter-spacing: 1px; }
.pl-dur { font-family: var(--mono); font-size: 13px; opacity: 0.7; }
.pl-play {
  font-family: var(--pixel);
  font-size: 14px;
  width: 28px;
  height: 28px;
  border: 2px solid var(--wood-dark);
  background: var(--cream);
  display: grid;
  place-items: center;
}
.playlist-progress {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 2px dashed var(--wood-dark);
}
.pp-bar {
  height: 10px;
  background: var(--cream);
  border: 2px solid var(--wood-dark);
  position: relative;
  overflow: hidden;
}
.pp-bar::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 40%;
  background: repeating-linear-gradient(-45deg, var(--sunset) 0 6px, var(--rose) 6px 12px);
  animation: pp-slide 8s linear infinite;
}

/* ============================================
   MAP
   ============================================ */
.map-container {
  border: 4px solid var(--wood-dark);
  box-shadow: 8px 8px 0 var(--wood-dark);
  background: #c8dcb0;
  overflow: hidden;
}
.map-bg {
  position: relative;
  width: 100%;
  aspect-ratio: 2 / 1;
  background:
    radial-gradient(ellipse at 25% 30%, #a8c88a 0 20%, transparent 21%),
    radial-gradient(ellipse at 75% 60%, #9fc080 0 25%, transparent 26%),
    linear-gradient(135deg, #c8dcb0, #a8c88a);
}
.map-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(74, 44, 26, 0.08) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(74, 44, 26, 0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}
.map-path {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.map-pin {
  position: absolute;
  transform: translate(-50%, -50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.pin-heart {
  animation: heart-pulse 1.5s ease-in-out infinite;
  filter: drop-shadow(2px 2px 0 var(--wood-dark));
}
.map-pin:hover .pin-heart { transform: scale(1.3); }
.pin-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--cream);
  border: 3px solid var(--wood-dark);
  box-shadow: 3px 3px 0 var(--wood-dark);
  padding: 8px 12px;
  white-space: nowrap;
  font-size: 14px;
  font-style: italic;
  color: var(--wood-dark);
}

/* ============================================
   ACHIEVEMENTS
   ============================================ */
.ach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}
.ach-card {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  background: var(--cream-2);
  border: 3px solid var(--wood-dark);
  box-shadow: 4px 4px 0 var(--wood-dark);
  padding: 16px 18px;
  transition: transform 0.15s;
}
.ach-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--wood-dark); }
.ach-card.locked { opacity: 0.45; filter: grayscale(0.8); }
.ach-icon {
  font-size: 36px;
  width: 56px; height: 56px;
  display: grid; place-items: center;
  background: var(--cream);
  border: 2px solid var(--wood-dark);
  flex-shrink: 0;
}
.ach-title {
  font-size: 17px;
  font-weight: 600;
  font-style: italic;
  margin-bottom: 2px;
}
.ach-desc { font-size: 13px; opacity: 0.85; line-height: 1.4; text-wrap: pretty; }
.ach-rarity {
  display: inline-block;
  margin-top: 6px;
  font-family: var(--pixel);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--wood-dark);
  color: var(--cream);
}
.rarity-lendário .ach-rarity { background: var(--gold); color: var(--wood-dark); }
.rarity-épico .ach-rarity { background: #8b4a9c; }
.rarity-raro .ach-rarity { background: var(--sunset); }

/* ============================================
   INVENTORY
   ============================================ */
.inv-wrapper {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
  background: var(--cream-2);
  border: 4px solid var(--wood-dark);
  box-shadow: 8px 8px 0 var(--wood-dark);
  padding: 20px;
}
.inv-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
}
.inv-slot {
  aspect-ratio: 1;
  background: var(--cream);
  border: 3px solid var(--wood-dark);
  position: relative;
  cursor: pointer;
  transition: transform 0.1s;
  padding: 0;
  box-shadow: inset 2px 2px 0 rgba(255,255,255,0.5), inset -2px -2px 0 rgba(0,0,0,0.08);
}
.inv-slot:not(:disabled):hover { transform: scale(1.05); background: #fff6dd; }
.inv-slot:disabled { cursor: default; opacity: 0.5; }
.inv-slot.selected {
  background: var(--gold);
  box-shadow: inset 0 0 0 2px var(--wood-dark);
}
.inv-icon { font-size: 28px; }
.inv-qty {
  position: absolute;
  bottom: 2px; right: 4px;
  font-family: var(--pixel);
  font-size: 14px;
  color: var(--wood-dark);
  text-shadow: 1px 1px 0 var(--cream);
}
.inv-detail {
  background: var(--cream);
  border: 3px solid var(--wood-dark);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.inv-detail-icon { font-size: 56px; margin-bottom: 8px; }
.inv-detail-name {
  font-family: var(--pixel);
  font-size: 20px;
  letter-spacing: 1.5px;
  color: var(--sunset);
  margin-bottom: 8px;
  text-align: center;
}
.inv-detail-desc {
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
  opacity: 0.85;
  text-wrap: pretty;
}
.inv-detail-qty {
  margin-top: 8px;
  font-family: var(--pixel);
  color: var(--wood);
}

/* ============================================
   FINAL CARD
   ============================================ */
.final-wrap {
  text-align: center;
  min-height: 420px;
  display: grid;
  place-items: center;
  position: relative;
}
.gift-button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
.gift-label {
  font-family: var(--pixel);
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--sunset);
  text-shadow: 2px 2px 0 var(--wood-dark);
}
.final-open {
  background: var(--cream-2);
  border: 4px solid var(--rose);
  box-shadow: 10px 10px 0 var(--wood-dark), 0 0 40px rgba(201, 76, 76, 0.3);
  padding: 48px 32px;
  max-width: 560px;
  position: relative;
}
.final-hearts {
  position: absolute;
  inset: 0;
  overflow: visible;
  pointer-events: none;
}
.final-text p {
  text-wrap: pretty;
  font-style: italic;
  color: var(--wood-dark);
}

/* ============================================
   DIALOG BOX (NPC)
   ============================================ */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13, 10, 46, 0.5);
  display: grid;
  place-items: end center;
  z-index: 100;
  padding: 0 0 40px;
  cursor: pointer;
}
.dialog-box {
  background: var(--cream);
  border: 4px solid var(--wood-dark);
  box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.4);
  padding: 24px 28px 18px;
  width: min(680px, 90vw);
  cursor: default;
  position: relative;
  animation: dialog-in 0.2s steps(3);
}
.dialog-who {
  font-family: var(--pixel);
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--sunset);
  margin-bottom: 10px;
  text-transform: lowercase;
}
.dialog-who::before { content: '— '; }
.dialog-text {
  font-size: 19px;
  line-height: 1.5;
  color: var(--wood-dark);
  min-height: 60px;
  text-wrap: pretty;
}
.dialog-cursor {
  display: inline-block;
  animation: dialog-blink 0.6s steps(2) infinite;
  color: var(--sunset);
}
.dialog-hint {
  text-align: right;
  margin-top: 10px;
  font-family: var(--pixel);
  font-size: 13px;
  color: var(--wood);
  letter-spacing: 1.5px;
  cursor: pointer;
}

/* ============================================
   INTRO CUTSCENE
   ============================================ */
.intro-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #2d1b3d, #0d0a2e 70%);
  z-index: 1000;
  display: grid;
  place-items: center;
  animation: intro-fade-in 0.3s;
}
.intro-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.intro-star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--firefly);
  animation: star-twinkle 2s ease-in-out infinite;
}
.intro-inner {
  text-align: center;
  color: var(--cream);
  font-family: var(--pixel);
  position: relative;
  padding: 30px;
  max-width: 600px;
}
.intro-sub {
  font-size: 16px;

// Pixel art helpers - desenha sprites a partir de strings de caracteres
// Cada caractere = 1 pixel. Use um mapa de cor por sprite.

function PixelSprite({ data, palette, scale = 4, className = '', style = {} }) {
  const rows = data.trim().split('\n').map(r => r.trim());
  const h = rows.length;
  const w = Math.max(...rows.map(r => r.length));
  return (
    <div
      className={className}
      style={{
        position: 'relative',
        width: w * scale,
        height: h * scale,
        imageRendering: 'pixelated',
        ...style,
      }}
    >
      <svg
        width={w * scale}
        height={h * scale}
        viewBox={`0 0 ${w} ${h}`}
        style={{ display: 'block', imageRendering: 'pixelated', shapeRendering: 'crispEdges' }}
      >
        {rows.map((row, y) =>
          row.split('').map((ch, x) => {
            const color = palette[ch];
            if (!color) return null;
            return <rect key={`${x}-${y}`} x={x} y={y} width={1} height={1} fill={color} />;
          })
        )}
      </svg>
    </div>
  );
}

const { useState: useStateU, useEffect: useEffectU, useRef: useRefU } = React;

// --- SOUND SYSTEM (WebAudio 8-bit tones) ---
const audioCtx = typeof window !== 'undefined' ? new (window.AudioContext || window.webkitAudioContext)() : null;

function playTone(freq, dur = 0.08, type = 'square', vol = 0.05) {
  if (!audioCtx || window.__muted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playClick() { playTone(880, 0.04); setTimeout(() => playTone(1320, 0.04), 30); }
function playDialog() { playTone(440, 0.03); setTimeout(() => playTone(660, 0.03), 30); }
function playHeart() { playTone(660, 0.08); setTimeout(() => playTone(880, 0.08), 70); setTimeout(() => playTone(1100, 0.1), 140); }

window.playClick = playClick;
window.playDialog = playDialog;
window.playHeart = playHeart;

// --- DIALOG BOX ---
function DialogBox({ dialog, onClose }) {
  const [shown, setShown] = useStateU('');
  const full = dialog ? dialog.text : '';
  useEffectU(() => {
    if (!dialog) return;
    setShown('');
    let i = 0;
    const id = setInterval(() => {
      i++;
      setShown(full.slice(0, i));
      if (i % 3 === 0) playTone(440 + Math.random() * 60, 0.02, 'square', 0.03);
      if (i >= full.length) clearInterval(id);
    }, 28);
    return () => clearInterval(id);
  }, [dialog]);
  if (!dialog) return null;
  return (
    <div className="dialog-overlay" onClick={onClose}>
      <div className="dialog-box" onClick={(e) => e.stopPropagation()}>
        <div className="dialog-who">{dialog.who}</div>
        {dialog.photo && (
          <div style={{ marginBottom: 14, border: '3px solid var(--wood-dark)', boxShadow: '4px 4px 0 var(--wood-dark)', maxHeight: '55vh', overflow: 'hidden', background: '#000' }}>
            <img src={dialog.photo} alt={dialog.who} style={{ width: '100%', maxHeight: '55vh', objectFit: 'contain', display: 'block' }} />
          </div>
        )}
        {dialog.caption && (
          <div style={{ fontFamily: 'var(--pixel)', fontSize: 12, letterSpacing: 1.5, color: 'var(--sunset)', textTransform: 'uppercase', marginBottom: 10 }}>{dialog.caption}</div>
        )}
        <div className="dialog-text">{shown}<span className="dialog-cursor">▮</span></div>
        <div className="dialog-hint" onClick={onClose}>clique ou pressione espaço ▸</div>
      </div>
    </div>
  );
}

// --- INTRO CUTSCENE ---
function Intro({ onDone }) {
  const [step, setStep] = useStateU(0);
  const scenes = [
    { sub: 'carregando save file...', line: 'save "Eduardo & Isabella.dat"' },
    { sub: 'dia 365 de 365', line: 'faz 1 ano hoje.' },
    { sub: 'ativando modo amor...', line: 'pressione qualquer tecla para começar ♥' },
  ];
  useEffectU(() => {
    const k = () => {
      if (step < scenes.length - 1) {
        setStep(s => s + 1);
        playClick();
      } else {
        playHeart();
        onDone();
      }
    };
    const t = step < 2 ? setTimeout(() => setStep(step + 1), 1800) : null;
    window.addEventListener('keydown', k);
    window.addEventListener('click', k);
    return () => { if (t) clearTimeout(t); window.removeEventListener('keydown', k); window.removeEventListener('click', k); };
  }, [step]);

  return (
    <div className="intro-overlay">
      <div className="intro-stars">
        {Array.from({ length: 60 }).map((_, i) => (
          <div key={i} className="intro-star" style={{ left: `${Math.random() * 100}%`, top: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 2}s` }} />
        ))}
      </div>
      <div className="intro-inner">
        <div style={{ marginBottom: 24, animation: 'heart-pulse 1.2s ease-in-out infinite' }}>
          <PixelSprite data={HEART_DATA} palette={HEART_PALETTE} scale={8} />
        </div>
        <div className="intro-sub">{scenes[step].sub}</div>
        <div className="intro-line">{scenes[step].line}</div>
        <div className="intro-dots">
          {scenes.map((_, i) => <span key={i} className={i <= step ? 'on' : ''} />)}
        </div>
      </div>
    </div>
  );
}

      <span style={{ fontFamily: 'var(--pixel)', fontSize: 14 }}>{muted ? '🔇 MUTE' : '🔊 SOM'}</span>
    </button>

}

const { useState, useEffect, useRef } = React;

function useTimeOfDay() {
  // Retorna 0..1 representando hora do dia simulada (acelerada)
  // Ciclo completo = 90s. Começa no pôr do sol (0.7).
  const [t, setT] = useState(0.7);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const loop = (now) => {
      const elapsed = (now - start) / 1000;
      const v = (0.7 + elapsed / 90) % 1;
      setT(v);
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);
  return t;
}

function skyGradient(t) {
  // t: 0=meia-noite, 0.25=amanhecer, 0.5=meio-dia, 0.75=pôr do sol
  const stops = [
    { t: 0.00, top: '#0d0a2e', bot: '#2d1b3d' },   // noite profunda
    { t: 0.20, top: '#3a2b5c', bot: '#c46b7a' },   // amanhecer
    { t: 0.30, top: '#7ab8d9', bot: '#ffd4a3' },   // manhã
    { t: 0.50, top: '#87ceeb', bot: '#f4e4c1' },   // dia
    { t: 0.70, top: '#d97760', bot: '#f4c99c' },   // tarde/pôr do sol
    { t: 0.80, top: '#9c4a6b', bot: '#ff8a6b' },   // pôr do sol
    { t: 0.90, top: '#3a2b5c', bot: '#7a4a7c' },   // entardecer
    { t: 1.00, top: '#0d0a2e', bot: '#2d1b3d' },
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].t && t <= stops[i + 1].t) {
      const k = (t - stops[i].t) / (stops[i + 1].t - stops[i].t);
      return { top: lerpColor(stops[i].top, stops[i + 1].top, k), bot: lerpColor(stops[i].bot, stops[i + 1].bot, k) };
    }
  }
  return stops[0];
}

function lerpColor(a, b, k) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa >> 16) & 255, ag = (pa >> 8) & 255, ab = pa & 255;
  const br = (pb >> 16) & 255, bg = (pb >> 8) & 255, bb = pb & 255;
  const r = Math.round(ar + (br - ar) * k);
  const g = Math.round(ag + (bg - ag) * k);
  const bl = Math.round(ab + (bb - ab) * k);
  return '#' + ((r << 16) | (g << 8) | bl).toString(16).padStart(6, '0');
}

function Player({ boundaryRef }) {
  const [pos, setPos] = useState({ x: 50, y: 50 });
  const [facing, setFacing] = useState('right');
  const [walking, setWalking] = useState(false);
  const keys = useRef({});

  useEffect(() => {
    const onDown = (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(e.key)) {
        keys.current[e.key.toLowerCase()] = true;
        setWalking(true);
        e.preventDefault();
      }
    };
    const onUp = (e) => {
      keys.current[e.key.toLowerCase()] = false;
      if (!Object.values(keys.current).some(Boolean)) setWalking(false);
    };
    window.addEventListener('keydown', onDown);
    window.addEventListener('keyup', onUp);
    return () => { window.removeEventListener('keydown', onDown); window.removeEventListener('keyup', onUp); };
  }, []);

  useEffect(() => {
    let raf;
    const loop = () => {
      setPos(p => {
        let { x, y } = p;
        const step = 0.5;
        if (keys.current.arrowup || keys.current.w) y -= step;
        if (keys.current.arrowdown || keys.current.s) y += step;
        if (keys.current.arrowleft || keys.current.a) { x -= step; setFacing('left'); }
        if (keys.current.arrowright || keys.current.d) { x += step; setFacing('right'); }
        x = Math.max(2, Math.min(96, x));
        y = Math.max(40, Math.min(92, y));
        return { x, y };
      });
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <div
      style={{
        position: 'absolute',
        left: `${pos.x}%`,
        top: `${pos.y}%`,
        transform: `translate(-50%, -100%) scaleX(${facing === 'left' ? -1 : 1})`,
        transition: 'left 0.05s linear, top 0.05s linear',
        zIndex: 20,
        filter: 'drop-shadow(0 4px 0 rgba(0,0,0,0.3))',
      }}
    >
      <div style={{ animation: walking ? 'bob 0.3s steps(2) infinite' : 'none' }}>
        <img src="/characters/edu.png" alt="Eduardo" style={{ width: 48, height: 'auto', imageRendering: 'pixelated', display: 'block', filter: 'drop-shadow(0 2px 0 rgba(0,0,0,0.25))' }} />
      </div>
      {walking && (
        <div style={{ position: 'absolute', bottom: -4, left: '50%', transform: 'translateX(-50%)', width: 20, height: 3, background: 'rgba(0,0,0,0.2)', borderRadius: '50%' }} />
      )}
    </div>
  );
}

// Contador ao vivo
const { useState: useStateC, useEffect: useEffectC } = React;

const START_DATE = new Date('2025-04-18T00:00:00');

function useCountdown() {
  const [now, setNow] = useStateC(new Date());
  useEffectC(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const diffMs = now - START_DATE;
  const totalSec = Math.floor(diffMs / 1000);
  const years = Math.floor(totalSec / (365.25 * 86400));
  let rem = totalSec - Math.floor(years * 365.25 * 86400);
  const months = Math.floor(rem / (30.44 * 86400));
  rem -= Math.floor(months * 30.44 * 86400);
  const days = Math.floor(rem / 86400);
  rem -= days * 86400;
  const hours = Math.floor(rem / 3600);
  rem -= hours * 3600;
  const mins = Math.floor(rem / 60);
  const secs = rem - mins * 60;
  return { years, months, days, hours, mins, secs, totalSec };
}

function PixelCounter() {
  const c = useCountdown();
  const cells = [
    { n: c.years, l: 'anos' },
    { n: c.months, l: 'meses' },
    { n: c.days, l: 'dias' },
    { n: c.hours, l: 'h' },
    { n: c.mins, l: 'min' },
    { n: c.secs, l: 'seg' },
  ];
  return (
    <section className="counter-section" id="contador">
      <div className="pixel-card" style={{ maxWidth: 920, margin: '0 auto' }}>
        <div className="pixel-card-header">
          <span className="dot" /> AMOR INFINITO · DESDE 18 ABR 2025 <span className="dot" />
        </div>
        <div className="counter-grid">
          {cells.map((cell, i) => (
            <div className="counter-cell" key={i}>
              <div className="counter-num">{String(cell.n).padStart(2, '0')}</div>
              <div className="counter-label">{cell.l}</div>
            </div>
          ))}
        </div>
        <div className="counter-foot">
          <span style={{ fontFamily: 'var(--pixel)' }}>{c.totalSec.toLocaleString('pt-BR')}</span> segundos amando você.
        </div>
      </div>
    </section>
  );
}

const BR_TZ = '-03:00';

function dateInputToISO(dateStr) {
  // dateStr: 'YYYY-MM-DD' → '2025-11-15T00:00:00-03:00'
  if (!dateStr) return null;
  return `${dateStr}T12:00:00${BR_TZ}`;
}

function isoToDateInput(iso) {
  if (!iso) return '';
  return iso.slice(0, 10);
}

function formatDatePt(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  } catch { return iso; }
}

function photoUrl(photoId) {
  return `/api/photos/${photoId}/file`;
}

            <div style={{ display: 'flex', gap: 8, marginLeft: 'auto' }}>
              <button className="pixel-btn pixel-btn-small" style={{ background: 'var(--wood)' }} disabled={saving} onClick={onCancel}>cancelar</button>
              <button className="pixel-btn pixel-btn-small" disabled={saving} onClick={handleSave}>{saving ? 'salvando...' : 'salvar'}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, { credentials: 'include', ...opts });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error(`${res.status} ${res.statusText}: ${txt}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

function Gallery({ onDialog }) {
  const [moments, setMoments] = useStateC([]);
  const [loading, setLoading] = useStateC(true);
  const [error, setError] = useStateC(null);
  const [editing, setEditing] = useStateC(null); // null | 'new' | id
  const [saving, setSaving] = useStateC(false);

  const refresh = async () => {
    setLoading(true);
    try {
      const list = await apiFetch('/api/moments');
      setMoments(Array.isArray(list) ? list : []);
      setError(null);
    } catch (e) {
      console.error('[gallery] fetch error:', e);
      setError('não consegui carregar as memórias. tenta recarregar a página.');
    } finally {
      setLoading(false);
    }
  };

  useEffectC(() => { refresh(); }, []);

  const editingItem = editing && editing !== 'new' ? moments.find((m) => m.id === editing) : null;

  const handleCardClick = (m) => {
    const photo = m.photos?.[0];
    onDialog({
      who: m.title,
      text: m.story,
      photo: photo ? photoUrl(photo.id) : null,
      caption: m.memeCaption || null,
    });
  };

  const handleSave = async (payload, file) => {
    setSaving(true);
    try {
      let moment;
      if (payload.id) {
        moment = await apiFetch(`/api/moments/${payload.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: payload.title,
            story: payload.story,
            memeCaption: payload.memeCaption,
            happenedAt: payload.happenedAt,
          }),
        });
      } else {
        moment = await apiFetch('/api/moments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: payload.title,
            story: payload.story,
            memeCaption: payload.memeCaption,
            happenedAt: payload.happenedAt,
          }),
        });
      }
      if (file && moment?.id) {
        const form = new FormData();
        form.append('files', file);
        await apiFetch(`/api/moments/${moment.id}/photos`, { method: 'POST', body: form });
      }
      setEditing(null);
      await refresh();
    } catch (e) {
      console.error('[gallery] save error:', e);
      alert('deu ruim ao salvar: ' + e.message);
    } finally {
      setSaving(false);
    }
  };

  const handleDelete = async (id) => {
    setSaving(true);
    try {
      await apiFetch(`/api/moments/${id}`, { method: 'DELETE' });
      setEditing(null);
      await refresh();
    } catch (e) {
      console.error('[gallery] delete error:', e);
      alert('erro ao apagar: ' + e.message);
    } finally {
      setSaving(false);
    }
  };

  const handleDeletePhoto = async (photoId) => {
    setSaving(true);
    try {
      await apiFetch(`/api/photos/${photoId}`, { method: 'DELETE' });
      await refresh();
    } catch (e) {
      console.error('[gallery] delete photo error:', e);
      alert('erro ao remover foto: ' + e.message);
    } finally {
      setSaving(false);
    }
  };

  return (
    <section className="gallery-section" id="galeria">
      <div className="section-label">NOSSA HISTÓRIA</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', gap: 16, flexWrap: 'wrap', marginBottom: 24 }}>
        <h2 className="section-title" style={{ marginBottom: 0 }}>momentos que não esqueço</h2>
        <button className="pixel-btn pixel-btn-small" onClick={() => setEditing('new')}>+ novo momento</button>
      </div>

      {loading && <div style={{ textAlign: 'center', padding: 40, fontFamily: 'var(--pixel)', letterSpacing: 2, opacity: 0.7 }}>carregando memórias...</div>}
      {error && <div style={{ textAlign: 'center', padding: 40, color: 'var(--rose)', fontStyle: 'italic' }}>{error}</div>}

      {!loading && !error && moments.length === 0 && (
        <div style={{ textAlign: 'center', padding: 60, background: 'var(--cream-2)', border: '3px solid var(--wood-dark)', boxShadow: '6px 6px 0 var(--wood-dark)' }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🌱</div>
          <h3 style={{ fontFamily: 'var(--serif)', fontSize: 24, fontStyle: 'italic', marginBottom: 8 }}>nenhum momento plantado ainda</h3>
          <p style={{ opacity: 0.75, maxWidth: 420, margin: '0 auto 20px' }}>
            clica no botão acima e planta a primeira memória de vocês aqui. uma foto, uma historinha, aquele meme interno.
          </p>
          <button className="pixel-btn" onClick={() => setEditing('new')}>+ primeira memória ♥</button>
        </div>
      )}

      {!loading && !error && moments.length > 0 && (
        <div className="gallery-grid">
          {moments.map((m) => {
            const photo = m.photos?.[0];
            return (
              <article key={m.id} className="memory-card" onClick={() => handleCardClick(m)} style={{ cursor: 'pointer' }}>
                <div className="memory-photo">
                  {photo ? (
                    <img
                      src={photoUrl(photo.id)}
                      alt={m.title}
                      style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', imageRendering: 'auto' }}
                    />
                  ) : (
                    <div className="photo-placeholder">
                      <div className="ph-pattern" />
                      <div className="ph-label">+ adicionar foto</div>
                    </div>
                  )}
                  <div className="memory-date-tag">{formatDatePt(m.happenedAt)}</div>
                </div>
                <div className="memory-body">
                  <h3>{m.title}</h3>
                  {m.memeCaption && <p style={{ fontFamily: 'var(--pixel)', fontSize: 13, letterSpacing: 1.5, color: 'var(--sunset)', textTransform: 'uppercase', margin: '0 0 8px' }}>{m.memeCaption}</p>}
                  <p>{m.story.length > 180 ? m.story.slice(0, 180) + '...' : m.story}</p>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    <button className="pixel-btn pixel-btn-small" onClick={(e) => { e.stopPropagation(); handleCardClick(m); }}>
                      abrir memória →
                    </button>
                    <button className="pixel-btn pixel-btn-small" style={{ background: 'var(--wood)' }} onClick={(e) => { e.stopPropagation(); setEditing(m.id); }}>
                      editar
                    </button>
                  </div>
                </div>
              </article>
            );
          })}
        </div>
      )}

      {editing && (
        <MemoryEditor
          initial={editingItem || null}
          onSave={handleSave}
          onCancel={() => setEditing(null)}
          onDelete={editingItem ? handleDelete : null}
          onDeletePhoto={editingItem ? handleDeletePhoto : null}
          saving={saving}
        />
      )}
    </section>
  );
}

// App principal — expõe Navbar e monta tudo
const { useState: useStateA, useEffect: useEffectA } = React;

function Navbar() {
  return (
    <nav className="navbar">
      <div className="navbar-brand">
        <PixelSprite data={HEART_DATA} palette={HEART_PALETTE} scale={3} />
        <span>EDUARDO ♥ ISABELLA</span>
      </div>
      <div className="navbar-links">
        <a className="nav-link" href="#contador" onClick={() => window.playClick()}>contador</a>
        <a className="nav-link" href="#galeria" onClick={() => window.playClick()}>momentos</a>
        <a className="nav-link" href="#linhadotempo" onClick={() => window.playClick()}>timeline</a>
        <a className="nav-link" href="#cartinha" onClick={() => window.playClick()}>cartinha</a>
        <a className="nav-link" href="#playlist" onClick={() => window.playClick()}>músicas</a>
        <a className="nav-link" href="#mapa" onClick={() => window.playClick()}>mapa</a>
        <a className="nav-link" href="#achievements" onClick={() => window.playClick()}>conquistas</a>
        <a className="nav-link" href="#inventario" onClick={() => window.playClick()}>inventário</a>
        <a className="nav-link" href="#final" onClick={() => window.playClick()}>♥</a>
      </div>
    </nav>
  );
}

function App() {
  const [showIntro, setShowIntro] = useStateA(() => !sessionStorage.getItem('intro_seen'));
  const [dialog, setDialog] = useStateA(null);

  useEffectA(() => {
    const onKey = (e) => {
      if (e.key === ' ' || e.key === 'Escape') {
        if (dialog) { setDialog(null); window.playClick(); }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [dialog]);

  const handleDialog = (d) => { setDialog(d); window.playDialog(); };
  const closeIntro = () => { sessionStorage.setItem('intro_seen', '1'); setShowIntro(false); };

  return (
    <>
      {showIntro && <Intro onDone={closeIntro} />}
      <Navbar />
      <Hero onDialog={handleDialog} />
      <PixelCounter />
      <Gallery onDialog={handleDialog} />
      <Timeline />
      <Letter />
      <Playlist />
      <MapSection />
      <Achievements />
      <Inventory />
      <FinalCard />
      <footer style={{
        textAlign: 'center',
        padding: '40px 20px 60px',
        fontFamily: 'var(--pixel)',
        fontSize: 14,
        letterSpacing: 2,
        color: 'var(--wood-dark)',
        opacity: 0.7,
      }}>
        ♥ feito com amor · save file v1.0 · {new Date().getFullYear()} ♥
      </footer>
      <DialogBox dialog={dialog} onClose={() => setDialog(null)} />
      <MuteToggle />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
